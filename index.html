<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SSC GPA Calculator</title>

<link rel="stylesheet" href="style.css">

<!-- ✅ PDF LIB -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

</head>
<body>

<div class="container">
  <h1>SSC GPA Calculator</h1>

  <div id="subjects"></div>

  <button onclick="calculateGPA()">Calculate GPA</button>
  <button onclick="downloadPDF()">Download PDF</button>

  <h2 id="result">Your GPA: --</h2>
</div>

<!-- ✅ PDF CONTENT -->
<div id="pdfContent">

  <h1 style="text-align:center;">SSC ACADEMIC REPORT</h1>
  <p style="text-align:center;">
    Group: Science | Generated on <span id="date"></span>
  </p>

  <hr>

  <h3>Subject-wise Marks & Grades</h3>

  <table>
    <thead>
      <tr>
        <th>Subject</th>
        <th>Marks</th>
        <th>Grade</th>
        <th>Points</th>
      </tr>
    </thead>
    <tbody id="pdfTable"></tbody>
  </table>

  <br>

  <div class="bottom">
    <div>
      <p><b>Result Status:</b> <span id="status"></span></p>
      <p><b>Education Board:</b> Bangladesh</p>
    </div>

    <div class="gpaBox">
      <h2 id="pdfGPA">5.00</h2>
      <p id="finalGrade"></p>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
